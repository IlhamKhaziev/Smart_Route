<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartRoute | Firebase + Access Sync</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0f172a; color: #f8fafc; min-height: 100vh; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); transition: all 0.2s; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(59,130,246,0.4); }
        .status-new { color: #fbbf24; background: rgba(251, 191, 36, 0.1); padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; border: 1px solid rgba(251, 191, 36, 0.3); }
        .status-working { color: #60a5fa; background: rgba(96, 165, 250, 0.1); padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; border: 1px solid rgba(96, 165, 250, 0.3); }
        .status-done { color: #34d399; background: rgba(52, 211, 153, 0.1); padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; border: 1px solid rgba(52, 211, 153, 0.3); }
    </style>
</head>
<body>

<div class="max-w-6xl mx-auto px-4 py-8">
    <header class="flex justify-between items-center mb-10">
        <div class="flex items-center gap-4">
            <div class="p-3 bg-blue-600 rounded-2xl shadow-lg shadow-blue-500/20">
                <i class="fas fa-route text-2xl text-white"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight">Smart<span class="text-blue-500">Route</span></h1>
        </div>
        
        <div class="flex items-center gap-4">
            <button id="exportAccessBtn" class="hidden md:flex items-center gap-2 px-4 py-2 bg-emerald-600/20 text-emerald-400 border border-emerald-500/30 rounded-xl hover:bg-emerald-600/30 transition">
                <i class="fas fa-database"></i> Синхронизация с Access
            </button>
            <div id="authSection">
                <button id="authBtn" class="flex items-center gap-2 px-6 py-2.5 bg-slate-800 border border-slate-700 rounded-xl hover:bg-slate-700 transition">
                    <i class="fab fa-google text-red-400"></i> <span>Войти через Google</span>
                </button>
            </div>
        </div>
    </header>

    <div id="roleSelection" class="hidden glass-card p-10 text-center max-w-2xl mx-auto my-20">
        <h2 class="text-2xl font-bold mb-2">Добро пожаловать!</h2>
        <p class="text-slate-400 mb-8">Выберите вашу роль в системе для настройки рабочего пространства</p>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <button onclick="setUserRole('диспетчер')" class="p-6 bg-blue-600/10 border border-blue-500/30 rounded-2xl hover:bg-blue-600/20 transition group">
                <i class="fas fa-headset text-4xl mb-4 text-blue-500 group-hover:scale-110 transition"></i>
                <h3 class="text-xl font-bold">Диспетчер</h3>
                <p class="text-sm text-slate-400 mt-2">Управление заказами и курьерами</p>
            </button>
            <button onclick="setUserRole('курьер')" class="p-6 bg-purple-600/10 border border-purple-500/30 rounded-2xl hover:bg-purple-600/20 transition group">
                <i class="fas fa-truck text-4xl mb-4 text-purple-500 group-hover:scale-110 transition"></i>
                <h3 class="text-xl font-bold">Курьер</h3>
                <p class="text-sm text-slate-400 mt-2">Доставка и отчетность</p>
            </button>
        </div>
    </div>

    <main id="dispatcherPanel" class="hidden space-y-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <section class="lg:col-span-2 glass-card p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold flex items-center gap-2">
                        <i class="fas fa-list-ul text-blue-500"></i> Активные заказы
                    </h2>
                    <button id="openModalBtn" class="btn-primary px-4 py-2 rounded-lg text-sm font-semibold">
                        + Добавить заказ
                    </button>
                </div>
                <div id="ordersList" class="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                    </div>
            </section>

            <aside class="space-y-8">
                <div class="glass-card p-6">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i class="fas fa-users text-purple-500"></i> Курьеры
                    </h2>
                    <div id="couriersList" class="space-y-4"></div>
                </div>
                <button id="optimizeBtn" class="w-full py-4 btn-primary rounded-2xl font-bold text-lg shadow-lg">
                    <i class="fas fa-bolt mr-2"></i> Оптимизировать
                </button>
            </aside>
        </div>
    </main>

    <main id="courierPanel" class="hidden max-w-2xl mx-auto space-y-6">
        <div class="glass-card p-6 border-l-4 border-l-blue-500">
            <h2 class="text-xl font-bold mb-4 italic" id="courierWelcome">Привет, Курьер!</h2>
            <div id="courierTasks" class="space-y-4">
                </div>
        </div>
        <button id="endShiftBtn" class="w-full py-4 bg-red-500/20 text-red-500 border border-red-500/30 rounded-2xl font-bold hover:bg-red-500/30 transition">
            Завершить смену
        </button>
    </main>
</div>

<div id="orderModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
    <div class="glass-card p-8 w-full max-w-md shadow-2xl">
        <h3 class="text-2xl font-bold mb-6">Детали заказа</h3>
        <div class="space-y-4">
            <div>
                <label class="text-xs text-slate-400 ml-2">Адрес</label>
                <input id="addrInp" type="text" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl mt-1 focus:border-blue-500 outline-none">
            </div>
            <div>
                <label class="text-xs text-slate-400 ml-2">Телефон</label>
                <input id="phoneInp" type="text" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl mt-1 focus:border-blue-500 outline-none">
            </div>
            <div class="flex gap-4">
                <button id="saveOrder" class="flex-1 btn-primary py-3 rounded-xl font-bold">Создать</button>
                <button id="closeModal" class="flex-1 bg-slate-700 py-3 rounded-xl font-bold">Отмена</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, updateDoc, doc, serverTimestamp, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    // --- КОНФИГУРАЦИЯ (ТВОЯ) ---
    const firebaseConfig = {
        apiKey: "AIzaSyCHpQu8po8ww50PHN6BdfMrUVtAXBnmwzo",
        authDomain: "smart-route-8ff6a.firebaseapp.com",
        projectId: "smart-route-8ff6a",
        storageBucket: "smart-route-8ff6a.firebasestorage.app",
        messagingSenderId: "610410290985",
        appId: "1:610410290985:web:e59962bd9b42d935bda138"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let userState = { uid: null, role: null, name: null };

    // --- АВТОРИЗАЦИЯ ---
    const authBtn = document.getElementById('authBtn');
    
    authBtn.onclick = async () => {
        if (userState.uid) {
            await signOut(auth);
            location.reload();
        } else {
            await signInWithPopup(auth, provider);
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            userState.uid = user.uid;
            userState.name = user.displayName;
            authBtn.innerHTML = `<i class="fas fa-sign-out-alt"></i> Выйти (${user.displayName.split(' ')[0]})`;
            
            // Проверка роли в БД
            const q = query(collection(db, "users"), where("uid", "==", user.uid));
            const snap = await getDocs(q);
            
            if (snap.empty) {
                document.getElementById('roleSelection').classList.remove('hidden');
            } else {
                userState.role = snap.docs[0].data().role;
                showPanel();
            }
        }
    });

    window.setUserRole = async (role) => {
        await addDoc(collection(db, "users"), {
            uid: userState.uid,
            name: userState.name,
            role: role,
            createdAt: serverTimestamp()
        });
        // Если курьер, создаем его в списке курьеров
        if (role === 'курьер') {
            await addDoc(collection(db, "couriers"), {
                uid: userState.uid,
                name: userState.name,
                isActive: true,
                vehicle: 'Легковая'
            });
        }
        location.reload();
    };

    function showPanel() {
        document.getElementById('roleSelection').classList.add('hidden');
        if (userState.role === 'диспетчер') {
            document.getElementById('dispatcherPanel').classList.remove('hidden');
            initDispatcher();
        } else {
            document.getElementById('courierPanel').classList.remove('hidden');
            document.getElementById('courierWelcome').innerText = `Привет, ${userState.name}!`;
            initCourier();
        }
    }

    // --- ЛОГИКА ДИСПЕТЧЕРА ---
    function initDispatcher() {
        // Подписка на заказы в реальном времени
        onSnapshot(query(collection(db, "orders"), orderBy("createdAt", "desc")), (snap) => {
            const list = document.getElementById('ordersList');
            list.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                list.innerHTML += `
                    <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700 flex justify-between items-center">
                        <div>
                            <div class="font-bold">${d.address}</div>
                            <div class="text-sm text-slate-400">${d.phone}</div>
                        </div>
                        <span class="status-${d.status === 'новый' ? 'new' : (d.status === 'в работе' ? 'working' : 'done')}">${d.status}</span>
                    </div>
                `;
            });
        });

        // Подписка на курьеров
        onSnapshot(collection(db, "couriers"), (snap) => {
            const list = document.getElementById('couriersList');
            list.innerHTML = '';
            snap.forEach(doc => {
                const c = doc.data();
                list.innerHTML += `
                    <div class="flex items-center gap-3 p-3 bg-slate-800/30 rounded-xl border border-slate-700">
                        <div class="w-2 h-2 rounded-full ${c.isActive ? 'bg-green-500 animate-pulse' : 'bg-slate-600'}"></div>
                        <div class="text-sm font-medium">${c.name}</div>
                    </div>
                `;
            });
        });
    }

    // --- МОДАЛЬНОЕ ОКНО И ЗАКАЗЫ ---
    const modal = document.getElementById('orderModal');
    document.getElementById('openModalBtn').onclick = () => modal.classList.remove('hidden');
    document.getElementById('closeModal').onclick = () => modal.classList.add('hidden');

    document.getElementById('saveOrder').onclick = async () => {
        const address = document.getElementById('addrInp').value;
        const phone = document.getElementById('phoneInp').value;
        if (!address || !phone) return alert('Заполните поля!');

        await addDoc(collection(db, "orders"), {
            address,
            phone,
            status: 'новый',
            createdAt: serverTimestamp()
        });
        modal.classList.add('hidden');
    };

    // --- ОПТИМИЗАЦИЯ (ПРОСТОЕ РАСПРЕДЕЛЕНИЕ) ---
    document.getElementById('optimizeBtn').onclick = async () => {
        const ordersSnap = await getDocs(query(collection(db, "orders"), where("status", "==", "новый")));
        const couriersSnap = await getDocs(query(collection(db, "couriers"), where("isActive", "==", true)));
        
        if (ordersSnap.empty || couriersSnap.empty) return alert("Нужны заказы и активные курьеры!");

        const couriers = couriersSnap.docs.map(d => d.id);
        let i = 0;
        
        for (const orderDoc of ordersSnap.docs) {
            await updateDoc(doc(db, "orders", orderDoc.id), {
                status: 'в работе',
                courierId: couriers[i % couriers.length]
            });
            i++;
        }
        alert("Маршруты распределены!");
    };

    // --- ЛОГИКА КУРЬЕРА ---
    async function initCourier() {
        const cQuery = query(collection(db, "couriers"), where("uid", "==", userState.uid));
        const cSnap = await getDocs(cQuery);
        if (cSnap.empty) return;
        const courierId = cSnap.docs[0].id;

        onSnapshot(query(collection(db, "orders"), where("courierId", "==", courierId)), (snap) => {
            const list = document.getElementById('courierTasks');
            list.innerHTML = '';
            snap.forEach(orderDoc => {
                const d = orderDoc.data();
                if (d.status === 'выполнен') return;
                
                list.innerHTML += `
                    <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-xl">
                        <div class="text-xs text-blue-400 font-bold mb-1">АДРЕС ДОСТАВКИ</div>
                        <div class="text-xl font-bold mb-4">${d.address}</div>
                        <button onclick="completeTask('${orderDoc.id}')" class="w-full py-3 bg-green-600 rounded-xl font-bold hover:bg-green-500 transition">
                            ВЫПОЛНЕНО
                        </button>
                    </div>
                `;
            });
        });
    }

    window.completeTask = async (id) => {
        await updateDoc(doc(db, "orders", id), { status: 'выполнен' });
    };

    // --- ЭКСПОРТ ДЛЯ ACCESS ---
    document.getElementById('exportAccessBtn').onclick = async () => {
        const snap = await getDocs(collection(db, "orders"));
        let csv = "ID,Address,Phone,Status,CreatedAt\n";
        
        snap.forEach(doc => {
            const d = doc.data();
            const date = d.createdAt ? d.createdAt.toDate().toLocaleString() : '';
            csv += `${doc.id},"${d.address}","${d.phone}",${d.status},"${date}"\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'SmartRoute_to_Access.csv');
        a.click();
    };

</script>
</body>
</html>
