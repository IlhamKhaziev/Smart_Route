<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartRoute | VRP System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; }
        .hidden { display: none !important; }
        iframe { border-radius: 0.75rem; border: none; width: 100%; height: 100%; }
        .map-bg { background: #1e293b; display: flex; align-items: center; justify-content: center; color: #475569; }
    </style>
</head>
<body>

<div class="max-w-7xl mx-auto px-4 py-6">
    <header class="flex justify-between items-center gap-4 mb-8 bg-slate-800/50 p-4 rounded-2xl border border-slate-700">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg"><i class="fas fa-route text-white"></i></div>
            <h1 class="text-xl font-bold">SmartRoute</h1>
        </div>
        <div class="flex items-center gap-4">
            <button id="exportBtn" class="hidden px-4 py-2 bg-slate-700 text-sm rounded-xl border border-slate-600 hover:bg-slate-600 transition flex items-center gap-2">
                <i class="fas fa-file-export text-emerald-400"></i> Экспорт таблиц
            </button>
            <button id="authBtn" class="px-5 py-2 bg-blue-600 rounded-xl text-sm font-semibold hover:bg-blue-500 transition">Войти</button>
        </div>
    </header>

    <div id="roleScreen" class="hidden fixed inset-0 z-50 bg-slate-900 flex items-center justify-center p-4">
        <div class="glass-card p-10 max-w-xl w-full text-center">
            <h2 class="text-3xl font-bold mb-8">Ваша роль в системе?</h2>
            <div class="grid grid-cols-2 gap-6">
                <button onclick="saveRole('диспетчер')" class="p-6 bg-blue-600/10 border border-blue-500/30 rounded-2xl hover:bg-blue-600/20">
                    <i class="fas fa-desktop text-4xl mb-3 text-blue-500"></i><br>Диспетчер
                </button>
                <button onclick="saveRole('курьер')" class="p-6 bg-emerald-600/10 border border-emerald-500/30 rounded-2xl hover:bg-emerald-600/20">
                    <i class="fas fa-motorcycle text-4xl mb-3 text-emerald-500"></i><br>Курьер
                </button>
            </div>
        </div>
    </div>

    <main id="dispPanel" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-4 space-y-4">
            <div class="glass-card p-5 h-[600px] flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold">Заказы</h3>
                    <button onclick="toggleModal('orderModal', true)" class="bg-blue-600 px-3 py-1 rounded-lg text-xs">+ Заказ</button>
                </div>
                <div id="dispOrdersList" class="space-y-3 overflow-y-auto flex-grow pr-2"></div>
                <button id="optimizeBtn" class="w-full mt-4 py-3 bg-emerald-600 rounded-xl font-bold">ОПТИМИЗИРОВАТЬ</button>
            </div>
        </div>
        <div class="lg:col-span-8 space-y-6">
            <div class="grid grid-cols-2 gap-6">
                <div class="glass-card p-5">
                    <h3 class="font-bold mb-3 text-sm">Курьеры ONLINE</h3>
                    <div id="dispCouriersList" class="space-y-2"></div>
                </div>
                <div class="glass-card p-5">
                    <h3 class="font-bold mb-3 text-sm">Мониторинг</h3>
                    <div id="stats" class="text-sm space-y-1 text-slate-400">
                        <div>Выполнено: <span id="statDone" class="text-emerald-400">0</span></div>
                        <div>В работе: <span id="statWork" class="text-blue-400">0</span></div>
                    </div>
                </div>
            </div>
            <div id="dispMap" class="glass-card h-[350px] map-bg overflow-hidden border border-slate-700">
                 <i class="fas fa-map-marked-alt text-4xl opacity-20"></i>
            </div>
        </div>
    </main>

    <main id="courPanel" class="hidden max-w-md mx-auto space-y-6">
        <div id="courWait" class="glass-card p-10 text-center">
            <i class="fas fa-bell text-4xl text-slate-600 mb-4 animate-pulse"></i>
            <h2 class="text-xl font-bold">Ожидание маршрута</h2>
        </div>

        <div id="courAcceptBlock" class="hidden glass-card p-6 border-t-4 border-t-amber-500">
            <h2 class="text-lg font-bold mb-4 text-amber-500">Пришел новый маршрут!</h2>
            <button onclick="acceptRoute()" class="w-full py-4 bg-emerald-600 rounded-xl font-bold">ПРИНЯТЬ МАРШРУТ</button>
        </div>

        <div id="courActive" class="hidden space-y-4">
            <div id="courMap" class="glass-card h-64 overflow-hidden bg-slate-800 border border-slate-700"></div>
            
            <div class="glass-card p-6 border-l-4 border-l-blue-500">
                <span class="text-[10px] uppercase text-blue-400 font-bold">Текущий адрес</span>
                <h2 id="curAddr" class="text-xl font-bold mb-4 leading-tight">...</h2>
                
                <div id="courButtonsArrival">
                    <button onclick="courierArrived()" class="w-full py-4 bg-blue-600 rounded-xl font-bold">Я ПРИБЫЛ НА МЕСТО</button>
                </div>
                <div id="courButtonsAction" class="hidden grid grid-cols-2 gap-4">
                    <button onclick="courierComplete(true)" class="py-4 bg-emerald-600 rounded-xl font-bold flex flex-col items-center">
                        <i class="fas fa-check-circle mb-1"></i> Выполнено
                    </button>
                    <button onclick="toggleModal('problemModal', true)" class="py-4 bg-red-600/20 text-red-500 border border-red-500/40 rounded-xl font-bold flex flex-col items-center">
                        <i class="fas fa-exclamation-triangle mb-1"></i> Проблема
                    </button>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="orderModal" class="fixed inset-0 bg-slate-950/90 hidden z-[100] flex items-center justify-center p-4">
    <div class="glass-card p-6 w-full max-w-md">
        <h3 class="text-xl font-bold mb-6">Новый заказ</h3>
        <div class="space-y-4">
            <input id="orderAddr" type="text" placeholder="Адрес доставки" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl outline-none focus:border-blue-500">
            <input id="orderPhone" type="tel" placeholder="Телефон" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl">
            <div class="flex gap-3">
                <button onclick="saveOrder()" class="flex-1 py-3 bg-emerald-600 rounded-xl font-bold">Создать</button>
                <button onclick="toggleModal('orderModal', false)" class="flex-1 py-3 bg-slate-700 rounded-xl">Отмена</button>
            </div>
        </div>
    </div>
</div>

<div id="problemModal" class="fixed inset-0 bg-slate-950/90 hidden z-[100] flex items-center justify-center p-4">
    <div class="glass-card p-6 w-full max-w-sm">
        <h3 class="text-lg font-bold mb-4 text-red-400">Причина проблемы</h3>
        <textarea id="problemNote" placeholder="Почему не доставлено?" class="w-full h-32 bg-slate-800 border border-slate-700 p-3 rounded-xl mb-4 outline-none"></textarea>
        <div class="flex gap-2">
            <button onclick="courierComplete(false)" class="flex-1 py-3 bg-red-600 rounded-xl font-bold">Отправить</button>
            <button onclick="toggleModal('problemModal', false)" class="flex-1 py-3 bg-slate-700 rounded-xl text-sm">Назад</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, onSnapshot, query, where, updateDoc, serverTimestamp, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

   const firebaseConfig = {
  apiKey: "AIzaSyCHpQu8po8ww50PHN6BdfMrUVtAXBnmwzo",
  authDomain: "smart-route-8ff6a.firebaseapp.com",
  projectId: "smart-route-8ff6a",
  storageBucket: "smart-route-8ff6a.firebasestorage.app",
  messagingSenderId: "610410290985",
  appId: "1:610410290985:web:e59962bd9b42d935bda138",
  measurementId: "G-4CZX8SNDBD"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let userState = { uid: null, role: null, name: null };
    let activeTasks = [];

    // --- СИСТЕМА ВХОДА (Без дублей) ---
    const authBtn = document.getElementById('authBtn');
    authBtn.onclick = () => userState.uid ? signOut(auth) : signInWithPopup(auth, provider);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            userState.uid = user.uid;
            userState.name = user.displayName;
            authBtn.innerText = `Выйти (${user.displayName.split(' ')[0]})`;
            
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);

            if (!userSnap.exists()) {
                document.getElementById('roleScreen').classList.remove('hidden');
            } else {
                userState.role = userSnap.data().role;
                initDashboard();
            }
        } else {
            location.reload();
        }
    });

    window.saveRole = async (role) => {
        await setDoc(doc(db, "users", userState.uid), {
            uid: userState.uid,
            name: userState.name,
            role: role,
            createdAt: serverTimestamp()
        });
        if (role === 'курьер') {
            await setDoc(doc(db, "couriers", userState.uid), {
                uid: userState.uid,
                name: userState.name,
                is_active: true
            });
        }
        location.reload();
    };

    function initDashboard() {
        document.getElementById('roleScreen').classList.add('hidden');
        if (userState.role === 'диспетчер') {
            document.getElementById('dispPanel').classList.remove('hidden');
            document.getElementById('exportBtn').classList.remove('hidden');
            initDispatcher();
        } else {
            document.getElementById('courPanel').classList.remove('hidden');
            initCourier();
        }
    }

    // --- КАРТЫ ---
    function updateMap(containerId, address) {
        const container = document.getElementById(containerId);
        if (!address) return;
        const q = encodeURIComponent(address);
        container.innerHTML = `<iframe src="https://maps.google.com/maps?q=${q}&t=&z=15&ie=UTF8&iwloc=&output=embed"></iframe>`;
    }

    // --- ДИСПЕТЧЕР ---
    function initDispatcher() {
        onSnapshot(query(collection(db, "orders"), orderBy("createdAt", "desc")), (snap) => {
            const list = document.getElementById('dispOrdersList');
            let done = 0, work = 0;
            list.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                if (data.status === 'выполнен') done++;
                if (data.status === 'в работе') work++;
                list.innerHTML += `<div class="p-3 bg-slate-800/40 border border-slate-700 rounded-xl text-xs flex justify-between">
                    <span>${data.address}</span><span class="text-blue-400 uppercase">${data.status}</span>
                </div>`;
            });
            document.getElementById('statDone').innerText = done;
            document.getElementById('statWork').innerText = work;
        });

        onSnapshot(collection(db, "couriers"), (snap) => {
            const list = document.getElementById('dispCouriersList');
            list.innerHTML = '';
            snap.forEach(d => {
                list.innerHTML += `<div class="text-xs bg-slate-800 p-2 rounded-lg border border-slate-700">🟢 ${d.data().name}</div>`;
            });
        });
        updateMap('dispMap', 'Almaty, Kazakhstan'); // Дефолтная карта диспетчера
    }

    window.saveOrder = async () => {
        const address = document.getElementById('orderAddr').value;
        if (!address) return alert("Введите адрес!");
        await addDoc(collection(db, "orders"), {
            address,
            phone: document.getElementById('orderPhone').value,
            status: 'новый',
            createdAt: serverTimestamp()
        });
        toggleModal('orderModal', false);
    };

    document.getElementById('optimizeBtn').onclick = async () => {
        const ords = await getDocs(query(collection(db, "orders"), where("status", "==", "новый")));
        const cours = await getDocs(query(collection(db, "couriers"), where("is_active", "==", true)));
        if (ords.empty || cours.empty) return alert("Нет заказов или курьеров!");
        
        const courIds = cours.docs.map(d => d.id);
        let i = 0;
        for (const o of ords.docs) {
            await updateDoc(doc(db, "orders", o.id), {
                status: 'в работе',
                courier_id: courIds[i % courIds.length]
            });
            i++;
        }
        alert("Оптимизировано!");
    };

    // --- КУРЬЕР ---
    function initCourier() {
        onSnapshot(query(collection(db, "orders"), where("courier_id", "==", userState.uid)), (snap) => {
            activeTasks = snap.docs.filter(d => d.data().status === 'в работе').map(d => ({id: d.id, ...d.data()}));
            
            if (activeTasks.length > 0) {
                document.getElementById('courWait').classList.add('hidden');
                document.getElementById('courAcceptBlock').classList.remove('hidden');
            } else {
                document.getElementById('courWait').classList.remove('hidden');
                document.getElementById('courActive').classList.add('hidden');
            }
        });
    }

    window.acceptRoute = () => {
        document.getElementById('courAcceptBlock').classList.add('hidden');
        document.getElementById('courActive').classList.remove('hidden');
        renderTask();
    };

    function renderTask() {
        if (activeTasks.length === 0) return location.reload();
        const task = activeTasks[0];
        document.getElementById('curAddr').innerText = task.address;
        document.getElementById('courButtonsArrival').classList.remove('hidden');
        document.getElementById('courButtonsAction').classList.add('hidden');
        updateMap('courMap', task.address); // КАРТА КУРЬЕРА ОБНОВЛЯЕТСЯ
    }

    window.courierArrived = () => {
        document.getElementById('courButtonsArrival').classList.add('hidden');
        document.getElementById('courButtonsAction').classList.remove('hidden');
    };

    window.courierComplete = async (isSuccess) => {
        const task = activeTasks[0];
        await updateDoc(doc(db, "orders", task.id), {
            status: isSuccess ? 'выполнен' : 'проблема',
            note: document.getElementById('problemNote').value
        });
        toggleModal('problemModal', false);
        activeTasks.shift();
        renderTask();
    };

    // --- ЭКСПОРТ (CSV для Access) ---
    document.getElementById('exportBtn').onclick = async () => {
        const tables = ['users', 'couriers', 'orders'];
        for (const table of tables) {
            const snap = await getDocs(collection(db, table));
            let csv = "ID," + (snap.empty ? "" : Object.keys(snap.docs[0].data()).join(",")) + "\n";
            snap.forEach(d => {
                const vals = Object.values(d.data()).map(v => `"${v}"`);
                csv += d.id + "," + vals.join(",") + "\n";
            });
            const link = document.createElement('a');
            link.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv);
            link.download = `${table}.csv`;
            link.click();
        }
    };

    window.toggleModal = (id, show) => document.getElementById(id).classList.toggle('hidden', !show);
</script>
</body>
</html>
